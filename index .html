<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>靈魂之塔 - Tower of Souls</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');
        
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: #e0e0e0; font-family: 'Cinzel', serif; overflow: hidden; }
        canvas { background: #0a0a0f; border: 5px solid #2c2c2e; box-shadow: 0 0 100px rgba(0,212,255,0.1) inset; display: none; }
        
        .menu-overlay { text-align: center; z-index: 100; background: radial-gradient(circle, #1a1a2e 0%, #000 100%); width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: absolute; }
        
        .menu-content { display: flex; align-items: center; gap: 60px; }
        .main-actions { display: flex; flex-direction: column; align-items: center; }

        h1 { font-size: 84px; margin: 0; color: #d4af37; text-shadow: 0 0 30px rgba(212,175,55,0.4); letter-spacing: 15px; }
        .btn { padding: 18px 50px; font-size: 24px; font-family: 'Cinzel', serif; background: transparent; border: 1px solid #d4af37; color: #d4af37; cursor: pointer; transition: 0.5s; margin-top: 20px; }
        .btn:hover { background: #d4af37; color: #000; box-shadow: 0 0 40px #d4af37; transform: scale(1.05); }

        .leaderboard { background: rgba(255,255,255,0.05); border: 1px solid #d4af37; padding: 20px; width: 250px; text-align: left; }
        .leaderboard h3 { color: #d4af37; margin-top: 0; border-bottom: 1px solid #d4af37; padding-bottom: 10px; text-align: center; font-size: 20px; }
        .score-item { display: flex; justify-content: space-between; margin: 8px 0; font-size: 16px; color: #00d4ff; }
        .score-item b { color: #ffd700; }

        #instruction-screen { display: none; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 800px; text-align: left; margin: 40px 0; background: rgba(255,255,255,0.05); padding: 30px; border: 1px solid #333; }
        .info-item b { color: #00d4ff; font-size: 20px; }

        #game-ui { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 30px; box-sizing: border-box; }
        .player-stats { position: absolute; top: 30px; left: 30px; }
        .hp-container { display: flex; gap: 8px; margin-bottom: 15px; }
        .hp-unit { width: 22px; height: 22px; background: #ff4d4d; border: 2px solid #ffd700; transform: rotate(45deg); box-shadow: 0 0 10px #ff4d4d; }
        .hp-unit.lost { background: #1a1a1a; border-color: #333; box-shadow: none; opacity: 0.5; }
        .soul-bar-bg { width: 240px; height: 12px; background: rgba(255,255,255,0.05); border: 1px solid #00ffff; border-radius: 20px; overflow: hidden; }
        #soul-fill { height: 100%; background: linear-gradient(90deg, #008299, #00ffff); width: 0%; transition: width 0.4s; }

        #boss-container { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); width: 700px; text-align: center; display: none; }
        #boss-name { font-size: 24px; color: #bf40bf; margin-bottom: 8px; letter-spacing: 10px; text-shadow: 0 0 15px #bf40bf; }
        .boss-hp-bg { width: 100%; height: 8px; background: rgba(0,0,0,0.8); border: 1px solid #bf40bf; }
        #boss-hp-fill { height: 100%; background: linear-gradient(90deg, #4b0082, #bf40bf); width: 100%; transition: width 0.2s; box-shadow: 0 0 15px #bf40bf; }

        #wave-counter { position: absolute; top: 30px; right: 30px; color: #ff4d4d; font-size: 28px; display: none; text-shadow: 0 0 10px #ff0000; font-weight: bold; }

        .bottom-guide { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 14px; color: rgba(212, 175, 55, 0.6); letter-spacing: 2px; text-align: center; pointer-events: none; }
        .bottom-guide b { color: #00d4ff; margin: 0 5px; }

        #global-stats { color: #888; margin-top: 15px; font-size: 16px; letter-spacing: 2px; }
        #global-count-val { color: #ffd700; font-weight: bold; text-shadow: 0 0 10px rgba(255,215,0,0.3); }

        #name-input-area { margin-top: 20px; display: none; }
        input[type="text"] { background: #111; border: 1px solid #d4af37; color: #fff; padding: 15px; font-size: 18px; font-family: 'Cinzel', serif; text-align: center; width: 200px; }
    </style>
</head>
<body>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, runTransaction, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6480dGkHUoNi5MKgqdOh-p5-kanGA4Pk",
            authDomain: "tos-54b2a.firebaseapp.com",
            projectId: "tos-54b2a",
            storageBucket: "tos-54b2a.firebasestorage.app",
            messagingSenderId: "950291263701",
            appId: "1:950291263701:web:ec18dd087a2fc6bdaab25c",
            measurementId: "G-CDDT3CVTF8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const playCountRef = ref(db, 'stats/globalPlayCount');

        onValue(playCountRef, (snapshot) => {
            const count = snapshot.val() || 0;
            const display = document.getElementById('global-count-val');
            if (display) display.innerText = count.toLocaleString();
        });

        window.incrementGlobalPlayCount = function() {
            runTransaction(playCountRef, (currentValue) => {
                return (currentValue || 0) + 1;
            });
        };
    </script>

    <div id="start-menu" class="menu-overlay">
        <h1>靈魂之塔</h1>
        <div class="menu-content">
            <div class="main-actions">
                <p style="color:#00d4ff; letter-spacing:5px;">— THE TOWER OF SOULS —</p>
                <div id="global-stats">全球已探索次數：<span id="global-count-val">...</span></div>
                <button class="btn" onclick="showInstructions(false)">踏入高塔 (劇情)</button>
                <button class="btn" onclick="showInstructions(true)" style="border-color:#ff4d4d; color:#ff4d4d; margin-top:15px;">挑戰無盡 (Endless)</button>
            </div>
            
            <div class="leaderboard" id="leaderboard-ui">
                <h3>無盡排行榜 (Top 5)</h3>
                <div id="leaderboard-list">
                    </div>
            </div>
        </div>
    </div>

    <div id="instruction-screen" class="menu-overlay">
        <h2 style="color:#d4af37; font-size:48px;">獵魂者手札</h2>
        <div class="info-grid">
            <div class="info-item"><b>[方向鍵]</b> 移動與跳躍 (支援二段跳)</div>
            <div class="info-item"><b>[R 鍵]</b> 魂刃揮砍 (回復靈魂)</div>
            <div class="info-item"><b>[W 鍵]</b> 靈魂治癒 (消耗 5 靈魂)</div>
            <div class="info-item"><b>[E 鍵]</b> 靈魂衝擊 (消耗 5 靈魂)</div>
        </div>
        <p id="mode-desc" style="color:#888;">擊敗遺忘皇后並奪回皇冠，取回你的宿命。</p>
        <button class="btn" onclick="startGame()">理解契約</button>
    </div>

    <div id="game-ui">
        <div class="player-stats">
            <div class="hp-container" id="hp-hearts"></div>
            <div class="soul-bar-bg"><div id="soul-fill"></div></div>
            <div style="font-size: 13px; color: #00ffff; margin-top: 8px;">SOUL: <span id="soul-val">0</span>/10</div>
            <div style="font-size: 16px; color: #ffd700; margin-top: 5px; text-shadow: 0 0 5px #ffd700;">SCORE: <span id="score-val">0</span></div>
        </div>
        <div id="wave-counter">WAVE: 1</div>
        <div id="boss-container">
            <div id="boss-name">遺忘皇后 · 塞拉菲娜</div>
            <div class="boss-hp-bg"><div id="boss-hp-fill"></div></div>
        </div>
    </div>

    <div id="overlay" class="menu-overlay" style="display:none; background:rgba(0,0,0,0.9);">
        <h2 id="overlay-text" style="font-size: 60px;"></h2>
        <p id="score-summary" style="font-size: 24px; color: #ffd700; margin-bottom: 20px;"></p>
        
        <div id="name-input-area">
            <p style="color:#00d4ff; font-size: 18px;">無盡傳奇！請輸入你的名字：</p>
            <input type="text" id="player-name" maxlength="10" placeholder="NAME...">
            <button class="btn" onclick="submitScore()" style="padding: 14px 20px; font-size: 18px; margin-left: 10px; margin-top: 0;">紀錄</button>
        </div>

        <button class="btn" id="restart-btn" onclick="location.reload()">重新輪迴</button>
    </div>

    <div id="footer-guide" class="bottom-guide" style="display:none;">
        [方向鍵] 移動與跳躍 | [R] 攻擊 | [W] 治癒 | [E] 衝擊
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 1000; canvas.height = 500;

let audioCtx, gameActive = false;
let currentRoom = 0; 
let isTransitioning = false;
let transitionAlpha = 0;
let bgmInterval;
let currentBgmMode = null;

let isEndless = false;
let waveCount = 0;

const world = { width: 3000, height: 500, gravity: 0.8 };
const camera = { x: 0 };
const keys = {};

const player = { 
    x: 100, y: 300, w: 34, h: 48, velX: 0, velY: 0, 
    hp: 5, maxHp: 5, soul: 0, facing: 1, 
    isAttacking: false, invincible: false, score: 0,
    jumps: 0, canJump: true
};

const roomData = {
    0: {
        width: 3000,
        enemies: [
            { x: 1000, y: 100, w: 40, h: 50, type: 'melee', hp: 3, maxHp: 3, velX: 0, velY: 0, dir: 1, kbTimer: 0 },
            { x: 2000, y: 100, w: 40, h: 50, type: 'shooter', hp: 2, maxHp: 2, velX: 0, velY: 0, lastShot: 0, kbTimer: 0 }
        ],
        platforms: [
            { x: 0, y: 450, w: 3000, h: 50 },
            { x: 600, y: 320, w: 250, h: 20 },
            { x: 1400, y: 280, w: 300, h: 20 }
        ]
    },
    1: {
        width: 1500, 
        enemies: [],
        platforms: [
            { x: 0, y: 450, w: 1500, h: 50 }
        ]
    }
};

let enemies = [];
let platforms = [];
let projectiles = [];
let particles = []; 
let goldOrbs = []; 

const boss = { x: 1200, y: 330, w: 100, h: 120, hp: 80, maxHp: 80, phase: 1, active: false, triggered: false, timer: 0, isDead: false };
const crownItem = { x: 0, y: 0, w: 40, h: 30, active: false };

function updateLeaderboardUI() {
    const scores = JSON.parse(localStorage.getItem('tos_scores') || '[]');
    const list = document.getElementById('leaderboard-list');
    list.innerHTML = scores.map((s, i) => `
        <div class="score-item"><span>${i+1}. ${s.name}</span><b>${s.score}</b></div>
    `).join('') || '<p style="color:#666; font-size:14px; text-align:center;">尚無紀錄...</p>';
}
updateLeaderboardUI();

function spawnGoldOrbs(width) {
    goldOrbs = [];
    for(let i=0; i<15; i++) {
        goldOrbs.push({
            x: 400 + Math.random() * (width - 800),
            y: 150 + Math.random() * 200,
            w: 12, h: 12,
            collected: false
        });
    }
}

function showInstructions(endlessMode) {
    isEndless = endlessMode;
    document.getElementById('start-menu').style.display = 'none';
    document.getElementById('instruction-screen').style.display = 'flex';
    document.getElementById('mode-desc').innerText = isEndless ? 
        "無盡波次：怪物將不斷變強。活下去，直到靈魂燃盡。" : 
        "擊敗遺忘皇后並奪回皇冠，取回你的宿命。";
}

function startGame() {
    if (typeof window.incrementGlobalPlayCount === 'function') {
        window.incrementGlobalPlayCount();
    }

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.getElementById('instruction-screen').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    document.getElementById('footer-guide').style.display = 'block'; 
    canvas.style.display = 'block';
    
    if(isEndless) {
        document.getElementById('wave-counter').style.display = 'block';
        world.width = 1500;
        platforms = [{ x: 0, y: 450, w: 1500, h: 50 }, { x: 400, y: 300, w: 200, h: 20 }, { x: 900, y: 300, w: 200, h: 20 }];
        enemies = [];
        spawnGoldOrbs(world.width);
        nextWave();
    } else {
        enemies = roomData[0].enemies.map(e => ({...e}));
        platforms = roomData[0].platforms;
        spawnGoldOrbs(roomData[0].width); 
    }

    gameActive = true;
    updateUI();
    playBGM('exploration');
    loop();
}

function nextWave() {
    waveCount++;
    document.getElementById('wave-counter').innerText = `WAVE: ${waveCount}`;
    const count = 2 + Math.floor(waveCount / 2); 
    for(let i=0; i<count; i++) {
        const type = Math.random() > 0.4 ? 'melee' : 'shooter';
        enemies.push({
            x: 500 + Math.random() * 800, y: 100, w: 40, h: 50, 
            type: type, hp: 2 + waveCount, maxHp: 2 + waveCount, 
            velX: 0, velY: 0, dir: 1, kbTimer: 0, lastShot: 0
        });
    }
    playSfx(400, 'sine', 0.5);
}

function playBGM(mode) {
    if (currentBgmMode === mode) return;
    if (bgmInterval) clearInterval(bgmInterval);
    currentBgmMode = mode;
    let step = 0;
    bgmInterval = setInterval(() => {
        if (!gameActive) { clearInterval(bgmInterval); return; }
        if (mode === 'exploration') {
            const notes = [48, 43, 44, 41]; 
            const freq = 440 * Math.pow(2, (notes[step % 4] - 69) / 12);
            playSfx(freq, 'triangle', 0.8, 0.04); 
            step++;
        } else if (mode === 'boss') {
            const notes = [60, 55, 58, 53, 61, 56, 59, 54]; 
            const freq = 440 * Math.pow(2, (notes[step % 8] - 69) / 12);
            playSfx(freq, 'square', 0.3, 0.06); 
            step++;
        }
    }, mode === 'exploration' ? 800 : 400);
}

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (!gameActive || isTransitioning) return;
    
    if (e.code === 'KeyR' && !player.isAttacking) {
        player.isAttacking = true;
        playSfx(150, 'sawtooth', 0.1);
        checkMelee();
        setTimeout(() => player.isAttacking = false, 200);
    }
    if (e.code === 'KeyW' && player.soul >= 5 && player.hp < player.maxHp) {
        player.soul -= 5; player.hp++; playSfx(600, 'sine', 0.5); updateUI();
    }
    if (e.code === 'KeyE' && player.soul >= 5) {
        player.soul -= 5;
        projectiles.push({ x: player.x, y: player.y + 10, w: 40, h: 20, velX: player.facing * 18, owner: 'player', power: 10 });
        playSfx(400, 'triangle', 0.4); updateUI();
    }
});
window.addEventListener('keyup', e => keys[e.code] = false);

function loop() {
    if (!gameActive) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    if (isTransitioning) {
        transitionAlpha += 0.02;
        if (transitionAlpha >= 1.2) {
            currentRoom = 1;
            player.x = 100;
            world.width = roomData[1].width;
            enemies = roomData[1].enemies;
            platforms = roomData[1].platforms;
            spawnGoldOrbs(world.width); 
            isTransitioning = false;
            for (let i = 0; i < 60; i++) {
                particles.push({
                    x: Math.random() * world.width, y: Math.random() * world.height,
                    r: Math.random() * 2.5 + 1, vy: -(Math.random() * 0.5 + 0.2),
                    vx: Math.random() * 0.4 - 0.2, alpha: Math.random() * 0.6 + 0.2
                });
            }
        }
        return;
    }
    if (transitionAlpha > 0) transitionAlpha -= 0.02;

    if (keys['ArrowRight']) { player.velX = 6; player.facing = 1; }
    else if (keys['ArrowLeft']) { player.velX = -6; player.facing = -1; }
    else { player.velX *= 0.8; }

    if ((keys['Space'] || keys['ArrowUp'])) {
        if (player.canJump && player.jumps < 2) {
            player.velY = -17;
            player.jumps++;
            player.jumping = true;
            player.canJump = false;
            playSfx(250 + (player.jumps * 50), 'sine', 0.1, 0.05);
        }
    } else {
        player.canJump = true; 
    }

    player.velY += world.gravity;
    player.x += player.velX; player.y += player.velY;
    handleColl(player);

    goldOrbs.forEach(orb => {
        if (!orb.collected && isColl(player, orb)) {
            orb.collected = true;
            player.score += 100;
            playSfx(1200, 'sine', 0.1, 0.05);
            updateUI();
        }
    });

    if (!isEndless && currentRoom === 0 && player.x > 2850) isTransitioning = true;
    if (isEndless && enemies.length === 0) nextWave();
    
    if (!isEndless && currentRoom === 1) {
        if (!boss.triggered && player.x > 850) {
            boss.triggered = true; boss.active = true;
            document.getElementById('boss-container').style.display = 'block';
            playBGM('boss');
        }
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if (p.y < -10) { p.y = world.height + 10; p.x = Math.random() * world.width; }
        });
    }

    camera.x = player.x - canvas.width / 2;
    camera.x = Math.max(0, Math.min(camera.x, world.width - canvas.width));

    enemies.forEach(e => {
        e.velY += world.gravity;
        if (e.kbTimer > 0) { e.kbTimer--; e.velX *= 0.9; }
        else {
            e.velX = 0; let d = Math.abs(player.x - e.x);
            if (e.type === 'melee' && d < 450) { e.dir = player.x > e.x ? 1 : -1; e.velX = e.dir * 3.5; }
            if (e.type === 'shooter' && d < 650 && Date.now() - e.lastShot > 2500) {
                projectiles.push({ x: e.x, y: e.y + 15, w: 15, h: 15, velX: (player.x > e.x ? 1 : -1) * 5, owner: 'enemy' });
                e.lastShot = Date.now();
            }
        }
        e.x += e.velX; e.y += e.velY;
        handleColl(e);
        if (!player.invincible && isColl(player, e)) takeDmg();
    });

    if (boss.active && !boss.isDead) {
        boss.timer++;
        let teleportFreq = boss.phase === 2 ? 150 : 250;
        if (boss.timer % teleportFreq === 0) {
            boss.x = 200 + Math.random() * (world.width - 400);
            playSfx(100, 'sine', 0.2, 0.1); 
        }
        if (boss.phase === 2 && boss.timer % 120 === 0) {
            for(let i=-1; i<=1; i++) projectiles.push({ x: boss.x, y: boss.y + 50, w: 20, h: 20, velX: -8, velY: i*2, owner: 'enemy' });
        }
        if (!player.invincible && isColl(player, boss)) takeDmg();
    }

    projectiles.forEach((p, i) => {
        p.x += p.velX; p.y += (p.velY || 0);
        if (p.owner === 'player') {
            enemies.forEach(e => { if (isColl(p, e)) { e.hp -= p.power; projectiles.splice(i, 1); player.score += 50; updateUI(); }});
            if (boss.active && isColl(p, boss)) { boss.hp -= p.power; updateUI(); projectiles.splice(i, 1); }
        } else {
            if (!player.invincible && isColl(p, player)) { takeDmg(); projectiles.splice(i, 1); }
        }
        if (p.x < -100 || p.x > world.width + 100) projectiles.splice(i, 1);
    });

    enemies = enemies.filter(e => e.hp > 0);
    
    if (!isEndless && boss.hp <= 0 && boss.active) {
        boss.isDead = true; boss.active = false;
        document.getElementById('boss-container').style.display = 'none';
        crownItem.x = boss.x + boss.w/2 - crownItem.w/2;
        crownItem.y = 450 - crownItem.h;
        crownItem.active = true;
        playSfx(800, 'sine', 0.5, 0.2);
    }
    if (crownItem.active && isColl(player, crownItem)) {
        crownItem.active = false;
        player.score += 5000; 
        endGame("奪回宿命之冠", "#ffd700");
    }
}

function handleColl(obj) {
    obj.x = Math.max(0, Math.min(obj.x, world.width - obj.w));
    let grounded = false;
    platforms.forEach(p => {
        if (obj.x < p.x + p.w && obj.x + obj.w > p.x && obj.y + obj.h > p.y && obj.y < p.y + p.h) {
            if (obj.velY > 0) { obj.y = p.y - obj.h; obj.velY = 0; grounded = true; }
        }
    });
    if (obj === player) {
        player.jumping = !grounded;
        if (grounded) {
            player.jumps = 0;
            player.canJump = true;
        }
    }
}

function checkMelee() {
    const hb = { x: player.facing === 1 ? player.x + player.w : player.x - 60, y: player.y, w: 60, h: player.h };
    enemies.forEach(e => {
        if (isColl(hb, e)) { e.hp--; e.velX = player.facing * 12; e.kbTimer = 15; player.soul = Math.min(10, player.soul + 1); updateUI(); }
    });
    if (boss.active && isColl(hb, boss)) { boss.hp--; player.soul = Math.min(10, player.soul + 1); updateUI(); }
}

function takeDmg() {
    player.hp--; player.invincible = true; updateUI();
    playSfx(120, 'sawtooth', 0.2, 0.3);
    if (player.hp <= 0) endGame(isEndless ? `止於第 ${waveCount} 波` : "靈魂支離破碎", "#ff4d4d");
    setTimeout(() => player.invincible = false, 1200);
}

function updateUI() {
    const container = document.getElementById('hp-hearts');
    container.innerHTML = '';
    for(let i=0; i<player.maxHp; i++) {
        const h = document.createElement('div'); h.className = i < player.hp ? 'hp-unit' : 'hp-unit lost';
        container.appendChild(h);
    }
    document.getElementById('soul-fill').style.width = (player.soul * 10) + '%';
    document.getElementById('soul-val').innerText = player.soul;
    document.getElementById('score-val').innerText = player.score; 
    document.getElementById('boss-hp-fill').style.width = (boss.hp / boss.maxHp * 100) + '%';
    if(boss.hp <= boss.maxHp/2) boss.phase = 2;
}

function playSfx(f, t, d, vol = 0.1) {
    if(!audioCtx) return;
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(vol, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
}

function isColl(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

let endingBgmInterval;
function endGame(t, c) {
    gameActive = false; 
    if (bgmInterval) clearInterval(bgmInterval);
    if (endingBgmInterval) clearInterval(endingBgmInterval);
    document.getElementById('overlay-text').innerText = t;
    document.getElementById('overlay-text').style.color = c;
    const scoreSummary = document.getElementById('score-summary');
    scoreSummary.innerText = (t === "奪回宿命之冠" ? "最終分數：" : "收集分數：") + player.score;
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('footer-guide').style.display = 'none';
    
    // 【修改處】：只有在無盡模式 (isEndless) 時，才檢查是否進入排行榜
    if (isEndless) {
        const scores = JSON.parse(localStorage.getItem('tos_scores') || '[]');
        if (scores.length < 5 || player.score > (scores[scores.length - 1]?.score || 0)) {
            document.getElementById('name-input-area').style.display = 'block';
        }
    }

    const isVictory = t === "奪回宿命之冠";
    const notes = isVictory ? [64, 67, 72, 71] : [48, 44, 43, 41];
    const waveType = isVictory ? 'sine' : 'sawtooth';
    let step = 0;
    endingBgmInterval = setInterval(() => {
        const freq = 440 * Math.pow(2, (notes[step % notes.length] - 69) / 12);
        playSfx(freq, waveType, 0.5, 0.15); step++;
    }, 600); 
}

window.submitScore = function() {
    const nameInput = document.getElementById('player-name').value.trim();
    const name = nameInput === "" ? "無名者" : nameInput;
    let scores = JSON.parse(localStorage.getItem('tos_scores') || '[]');
    scores.push({ name: name, score: player.score });
    scores.sort((a, b) => b.score - a.score);
    scores = scores.slice(0, 5); 
    localStorage.setItem('tos_scores', JSON.stringify(scores));
    document.getElementById('name-input-area').style.display = 'none';
    updateLeaderboardUI();
};

function draw() {
    const time = Date.now() / 1000;
    ctx.fillStyle = (currentRoom === 0 && !isEndless) ? '#0a0a0f' : '#000810';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.save(); ctx.translate(-camera.x * 0.2, 0);
    ctx.strokeStyle = (currentRoom === 0 && !isEndless) ? '#1a1a25' : '#002244';
    for(let i=0; i<world.width; i+=100) for(let j=0; j<500; j+=50) ctx.strokeRect(i+(j%100===0?0:50), j, 100, 50);
    ctx.restore();
    
    ctx.save(); ctx.translate(-camera.x, 0);

    if (currentRoom === 0 && !isEndless) {
        ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 5; ctx.shadowBlur = 20; ctx.shadowColor = '#d4af37';
        ctx.strokeRect(2900, 150, 80, 300); ctx.fillStyle = `rgba(212,175,55,${0.1 + Math.sin(time*3)*0.1})`; 
        ctx.fillRect(2900, 150, 80, 300); ctx.shadowBlur = 0;
    }
    
    if (currentRoom === 1 && !isEndless) {
        ctx.save();
        particles.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(191, 64, 191, ${p.alpha})`; ctx.shadowBlur = 10; ctx.shadowColor = '#bf40bf';
            ctx.fill();
        });
        ctx.restore();
    }

    goldOrbs.forEach(orb => {
        if (!orb.collected) {
            ctx.save(); let orbFloat = Math.sin(time * 6) * 4;
            ctx.fillStyle = '#ffd700'; ctx.shadowBlur = 15; ctx.shadowColor = '#ffd700';
            ctx.beginPath(); ctx.arc(orb.x + 6, orb.y + 6 + orbFloat, 6, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        }
    });

    platforms.forEach(p => {
        let grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
        grad.addColorStop(0, (currentRoom === 0 && !isEndless) ? '#333' : '#002b4d'); grad.addColorStop(1, '#111');
        ctx.fillStyle = grad; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = (currentRoom === 0 && !isEndless) ? '#d4af37' : '#00ffff'; ctx.fillRect(p.x, p.y, p.w, 3);
    });

    enemies.forEach(e => {
        ctx.save(); ctx.shadowBlur = 15;
        if (e.type === 'melee') {
            let grad = ctx.createLinearGradient(e.x, e.y, e.x + e.w, e.y + e.h);
            grad.addColorStop(0, '#800'); grad.addColorStop(1, '#200');
            ctx.fillStyle = grad; ctx.shadowColor = '#f00'; ctx.fillRect(e.x, e.y, e.w, e.h);
            ctx.fillStyle = '#ff4d4d'; ctx.fillRect(e.dir === 1 ? e.x+25 : e.x+5, e.y+10, 10, 4);
        } else {
            let floating = Math.sin(time * 4) * 5;
            let grad = ctx.createRadialGradient(e.x+20, e.y+20+floating, 5, e.x+20, e.y+20+floating, 25);
            grad.addColorStop(0, '#ff0'); grad.addColorStop(1, '#440');
            ctx.fillStyle = grad; ctx.shadowColor = '#ff0';
            ctx.beginPath(); ctx.arc(e.x+20, e.y+20+floating, 18, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
    });

    if (boss.active && !boss.isDead) {
        ctx.save(); let bossFloat = Math.sin(time * 2) * 15; ctx.translate(boss.x, boss.y + bossFloat);
        let bossGrad = ctx.createLinearGradient(0, 0, 0, boss.h);
        bossGrad.addColorStop(0, '#bf40bf'); bossGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = bossGrad; ctx.shadowBlur = boss.phase === 2 ? 50 : 25; ctx.shadowColor = '#bf40bf';
        ctx.beginPath(); ctx.moveTo(0, 30); ctx.lineTo(boss.w, 30); ctx.lineTo(boss.w + 20, boss.h); ctx.lineTo(-20, boss.h);
        ctx.closePath(); ctx.fill(); ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(boss.w/2, 40, 15, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ffd700'; ctx.shadowColor = '#ffd700'; ctx.fillRect(15, -10, 70, 15);
        for(let i=0; i<3; i++) { ctx.beginPath(); ctx.moveTo(20+i*25, -10); ctx.lineTo(35+i*25, -30); ctx.lineTo(50+i*25, -10); ctx.fill(); }
        ctx.restore();
    }

    if (crownItem.active) {
        ctx.save(); let crownFloat = Math.sin(time * 5) * 8; ctx.translate(crownItem.x, crownItem.y + crownFloat);
        ctx.fillStyle = '#ffd700'; ctx.shadowBlur = 25; ctx.shadowColor = '#ffd700';
        ctx.fillRect(0, 15, crownItem.w, 10);
        for(let i=0; i<3; i++) { ctx.beginPath(); ctx.moveTo(5 + i*15, 15); ctx.lineTo(10 + i*15, 0); ctx.lineTo(15 + i*15, 15); ctx.fill(); }
        ctx.restore();
    }

    if (!player.invincible || Math.floor(Date.now() / 100) % 2) {
        ctx.save(); let pGrad = ctx.createLinearGradient(player.x, player.y, player.x, player.y + player.h);
        pGrad.addColorStop(0, '#00d4ff'); pGrad.addColorStop(1, '#005580');
        ctx.fillStyle = pGrad; ctx.shadowBlur = 15; ctx.shadowColor = '#00d4ff';
        ctx.fillRect(player.x, player.y, player.w, player.h); ctx.fillStyle = '#fff';
        let coreSize = 6 + Math.sin(time*5) * 2;
        ctx.beginPath(); ctx.arc(player.x + player.w/2, player.y + 15, coreSize, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = 'rgba(0, 212, 255, 0.5)'; ctx.lineWidth = 4; ctx.beginPath();
        ctx.moveTo(player.x + (player.facing === 1 ? 0 : player.w), player.y + 15);
        ctx.bezierCurveTo(player.x - 20 * player.facing, player.y + 10, player.x - 30 * player.facing, player.y + 40, player.x - 40 * player.facing, player.y + 30);
        ctx.stroke(); ctx.restore();
    }

    if (player.isAttacking) {
        ctx.save(); let atkGrad = ctx.createLinearGradient(player.x, player.y, player.x + 80*player.facing, player.y);
        atkGrad.addColorStop(0, 'rgba(255,255,255,0.8)'); atkGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = atkGrad; ctx.shadowBlur = 20; ctx.shadowColor = '#fff';
        let slashX = player.facing === 1 ? player.x + player.w : player.x - 70;
        ctx.beginPath(); ctx.ellipse(slashX + 35, player.y + 25, 45, 25, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
    }

    projectiles.forEach(p => {
        ctx.save();
        if (p.owner === 'player') {
            ctx.fillStyle = '#0ff'; ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
            ctx.beginPath(); ctx.moveTo(p.x, p.y + p.h/2); ctx.lineTo(p.x + p.w/2, p.y);
            ctx.lineTo(p.x + p.w, p.y + p.h/2); ctx.lineTo(p.x + p.w/2, p.y + p.h);
            ctx.closePath(); ctx.fill();
        } else {
            ctx.fillStyle = '#bf40bf'; ctx.shadowBlur = 20; ctx.shadowColor = '#bf40bf';
            ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/4, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
    });

    ctx.restore();
    
    if (transitionAlpha > 0) {
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.min(1, transitionAlpha)})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
}
